# ── Simulation config ──────────────────────────────────────────────────────────

num_ticks: 300

# ── Dynamics ──────────────────────────────────────────────────────────────────
dynamics:
  initial_position: 0.0
  initial_velocity: 4.0
  gravity: 9.81
  restitution: 0.8
  bounce_gain: 5.0
  rate_hz: 100.0        # DYNAMICS_RATE_HZ

# ── Controller ────────────────────────────────────────────────────────────────
controller:
  kp: 0.5
  ki: 0.1
  kd: 0.05
  target_height: 1.0    # TARGET_HEIGHT
  tick_rate_hz: 100.0   # CTRL_RATE_HZ
  paddle_min: -0.2      # PADDLE_MIN
  paddle_max: 0.2       # PADDLE_MAX

# ── Solver ────────────────────────────────────────────────────────────────────
solver:
  type: fixed           # SOLVER — "fixed" or "variable"
  event_trigger: bounce # EVENT_TRIGGER — "bounce" or "peak" — variable only
  event_rate_hz: 1200.0 # EVENT_RATE_HZ — dynamics rate during event — variable only
  bounce_position_threshold: 0.05   # m — how close to paddle counts as near-bounce
  peak_velocity_threshold: 0.2      # m/s — how close to zero counts as near-peak


# ── Visualizer ────────────────────────────────────────────────────────────────
visualizer:
  target_height: 1.0    # TARGET_HEIGHT
  paddle_min: -1.0      # PADDLE_MIN
  paddle_max: 1.0       # PADDLE_MAX