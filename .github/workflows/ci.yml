name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: lint + unit tests ──────────────────────────────────────────────
  unit:
    name: "Tier 1 · Lint & Unit Tests"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python setup.py lint   # triggers ensure_venv()

      - name: Lint
        run: python setup.py lint

      - name: Unit tests
        run: python setup.py test

  # ── Smoke test: build controller and run main.py end to end ───────────────
  smoke:
    name: "Smoke · End-to-End Run"
    needs: unit
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python setup.py lint   # triggers ensure_venv()

      - name: Build controller library (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -S controller -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cp build/libpaddle_controller.so controller.so
          cp build/libpaddle_controller.so libpaddle_controller.so

      - name: Build controller library (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cmake -S controller -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-install_name,@rpath/controller.dylib"
          cmake --build build --config Release
          cp build/libpaddle_controller.dylib controller.dylib
          echo "Files in root after copy:"
          ls -la controller.dylib || echo "COPY FAILED"

      - name: Build controller library (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -S controller -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON
          cmake --build build --config Release
          copy build\Release\paddle_controller.dll controller.dll



      - name: Run simulation (headless, 10 ticks)
        if: matrix.os != 'windows-latest'
        run: venv/bin/python main.py --config tests/smoke_config.yaml --no-viz

      - name: Run simulation (headless, 10 ticks) Windows
        if: matrix.os == 'windows-latest'
        env:
          PYTHONUTF8: "1"
        run: venv\Scripts\python main.py --config tests/smoke_config.yaml --no-viz
     
      - name: Check output files exist
        run: |
          python -c "
          from pathlib import Path
          for f in ['output/scenario_results.csv', 'output/runtime_log.json', 'output/performance_metrics.json']:
              assert Path(f).exists(), f'Missing: {f}'
          print('All output files present')
          "

  # ── Tier 2: performance regression ────────────────────────────────────────
  performance:
    name: "Tier 2 · Performance Regression"
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run performance tests
        run: python setup.py test

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: tests/baseline.json
          retention-days: 14
