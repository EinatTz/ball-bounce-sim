name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: lint + unit tests ──────────────────────────────────────────────
  unit:
    name: "Tier 1 · Lint & Unit Tests"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python setup.py lint   # triggers ensure_venv()

      - name: Lint
        run: python setup.py lint

      - name: Unit tests
        run: python setup.py test

  # ── Smoke test: build controller and run main.py end to end ───────────────
  smoke:
    name: "Smoke · End-to-End Run"
    needs: unit
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            lib_src: build/libpaddle_controller.so
            lib_dst: controller.so
          - os: macos-latest
            lib_src: build/libpaddle_controller.dylib
            lib_dst: controller.dylib
          - os: windows-latest
            lib_src: build/Release/paddle_controller.dll
            lib_dst: controller.dll
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python setup.py lint   # triggers ensure_venv()

      - name: Build controller library
        run: |
          cmake -S controller -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: List build output (debug)
        if: runner.os != 'Windows'
        run: find build -name "*.so" -o -name "*.dylib" | head -20

      - name: Copy library to project root (Linux / macOS)
        if: runner.os != 'Windows'
        run: cp ${{ matrix.lib_src }} ${{ matrix.lib_dst }}

      - name: Copy library to project root (Windows)
        if: runner.os == 'Windows'
        run: copy ${{ matrix.lib_src }} ${{ matrix.lib_dst }}

      - name: Run simulation (headless, 10 ticks)
        if: runner.os != 'Windows'
        run: venv/bin/python main.py --config tests/smoke_config.yaml --no-viz

      - name: Run simulation (headless, 10 ticks) — Windows
        if: runner.os == 'Windows'
        run: venv\Scripts\python main.py --config tests/smoke_config.yaml --no-viz

      - name: Check output files exist
        run: |
          python -c "
          from pathlib import Path
          for f in ['output/scenario_results.csv', 'output/runtime_log.json', 'output/performance_metrics.json']:
              assert Path(f).exists(), f'Missing: {f}'
          print('All output files present')
          "

  # ── Tier 2: performance regression ────────────────────────────────────────
  performance:
    name: "Tier 2 · Performance Regression"
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run performance tests
        run: python setup.py test

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: tests/baseline.json
          retention-days: 14