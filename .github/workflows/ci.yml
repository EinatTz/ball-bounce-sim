name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: lint + unit tests ──────────────────────────────────────────────
  unit:
    name: "Tier 1 · Lint & Unit Tests"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python setup.py lint   # triggers ensure_venv()

      - name: Lint
        run: python setup.py lint

      - name: Unit tests
        run: python setup.py test

  # ── Tier 2: performance regression ────────────────────────────────────────
  performance:
    name: "Tier 2 · Performance Regression"
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run performance tests
        run: python setup.py test

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: tests/baseline.json
          retention-days: 14