name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-flight runs for the same branch/PR so pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: lint + unit tests ──────────────────────────────────────────────
  unit:
    name: "Tier 1 · Lint & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Run unit tests
        run: |
          pytest tests/test_unit.py \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Tier 2: performance regression ────────────────────────────────────────
  # Runs only if Tier 1 passes.
  performance:
    name: "Tier 2 · Performance Regression"
    runs-on: ubuntu-latest
    needs: unit   # ← gate on Tier 1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run performance regression tests
        run: |
          pytest tests/test_performance.py \
            -v \
            --tb=short

      - name: Upload performance results
        if: always()    # upload even on failure so we can inspect drift
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            tests/baseline.json
          retention-days: 14