# Scenario A — Fixed step solver, reasonable step size
# Dynamics at 300 Hz (dt = 3.3 ms) — well above the Nyquist rate for
# bounce events and smooth enough to capture peak heights accurately.

num_ticks: 500

dynamics:
  initial_position: 0.0
  initial_velocity: 4.0
  gravity: 9.81
  restitution: 0.8
  bounce_gain: 5.0
  rate_hz: 300.0        # dt = 3.3 ms — reasonable

controller:
  kp: 0.5
  ki: 0.1
  kd: 0.05
  target_height: 1.0
  tick_rate_hz: 100.0
  paddle_min: -0.2
  paddle_max: 0.2

solver:
  type: fixed
  event_trigger: bounce
  event_rate_hz: 1200.0
  bounce_position_threshold: 0.05
  peak_velocity_threshold: 0.2

visualizer:
  target_height: 1.0
  paddle_min: -1.0
  paddle_max: 1.0
