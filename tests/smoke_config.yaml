# Smoke test config — used by CI to verify main.py runs end to end.
# 10 ticks only, fixed solver, no scenario-specific settings.

num_ticks: 10

dynamics:
  initial_position: 0.0
  initial_velocity: 4.0
  gravity: 9.81
  restitution: 0.8
  bounce_gain: 5.0
  rate_hz: 300.0

controller:
  kp: 0.5
  ki: 0.1
  kd: 0.05
  target_height: 1.0
  tick_rate_hz: 100.0
  paddle_min: -0.2
  paddle_max: 0.2

solver:
  type: fixed
  event_trigger: bounce
  event_rate_hz: 1200.0
  bounce_position_threshold: 0.05
  peak_velocity_threshold: 0.2

visualizer:
  target_height: 1.0
  paddle_min: -1.0
  paddle_max: 1.0
